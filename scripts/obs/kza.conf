# Logstash pipeline for KZA voice metrics.
# Input: TCP JSON from MetricsEmitter (one JSON doc per line).
# Output: ES data stream `kza-logs-default` (convention: <app>-logs-*).
#
# Por qué TCP en vez de file: el `file` input en rootless-podman con bind
# mount a /home/kza/logs no detecta escrituras desde fuera del container
# (filewatch + overlayfs). TCP evita todo ese stack. El archivo JSONL en
# disco queda como backup durable.
input {
  tcp {
    port => 5515
    codec => json_lines
    tags => ["kza"]
  }
}

filter {
  if "kza" in [tags] {
    # @timestamp already in the document (ISO 8601 UTC with Z suffix).
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
    mutate {
      add_field => {
        "[data_stream][type]" => "logs"
        "[data_stream][dataset]" => "kza"
        "[data_stream][namespace]" => "default"
      }
      # Clean up noisy file input metadata
      remove_field => ["host", "log", "[event][original]"]
    }
  }
}

output {
  if "kza" in [tags] {
    # Index diario (simple y compatible). Kibana arma el data view `kza-logs-*`.
    # Si después querés data streams para ILM, pasar a data_stream => true y
    # cambiar el index template priority.
    elasticsearch {
      hosts => ["http://obs-elasticsearch:9200"]
      index => "kza-logs-%{+YYYY.MM.dd}"
      # Disable Logstash auto-template — usamos `kza-logs` template propio
      # aplicado vía _index_template. Sin esto, Logstash inyecta un template
      # ECS que mapea strings como text+keyword (no podemos agregar sobre `keyword`).
      manage_template => false
      ecs_compatibility => "disabled"
    }
  }
}
