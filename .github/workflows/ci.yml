name: KZA CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # LINT AND FORMAT CHECK
  # ============================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install ruff black isort mypy

      - name: Run ruff
        run: ruff check src/ tests/

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Check import order
        run: isort --check-only src/ tests/

  # ============================================================
  # UNIT TESTS
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # SAFETY TESTS (CRITICAL)
  # ============================================================
  safety-tests:
    name: Safety Tests (CRITICAL)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run safety tests
        run: |
          pytest tests/safety/ -v --tb=long
        # Safety tests MUST pass - no continue-on-error

      - name: Verify all safety tests passed
        run: |
          echo "✅ All safety tests passed!"
          echo "Permission checks: OK"
          echo "Command validation: OK"
          echo "Rate limiting: OK"

  # ============================================================
  # INTEGRATION TESTS
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, safety-tests]

    services:
      # Mock Home Assistant for integration tests
      homeassistant:
        image: homeassistant/home-assistant:stable
        ports:
          - 8123:8123

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Wait for Home Assistant
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:8123; do sleep 2; done' || true

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short
        env:
          HA_URL: http://localhost:8123
          HA_TOKEN: test_token

  # ============================================================
  # SECURITY SCAN
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run bandit security scan
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -ll  # Fail on medium+ severity

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --full-report || true

  # ============================================================
  # BUILD CHECK
  # ============================================================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, safety-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify imports work
        run: |
          python -c "from src.pipeline import ModelManager, VoicePipeline"
          python -c "from src.training import NightlyTrainer, NightlyConfig"
          python -c "from src.alerts import AlertManager"
          echo "✅ All imports successful"

      - name: Check configuration
        run: |
          python -c "import yaml; yaml.safe_load(open('config/settings.yaml'))"
          echo "✅ Configuration valid"

  # ============================================================
  # NIGHTLY TRAINING TEST (Scheduled)
  # ============================================================
  nightly-training-test:
    name: Nightly Training Simulation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Simulate nightly training cycle
        run: |
          python -c "
          import asyncio
          from src.training import NightlyTrainer, NightlyConfig

          async def test_cycle():
              config = NightlyConfig(
                  min_samples_to_train=1,
                  gpus=[0],
                  use_qlora=True
              )
              trainer = NightlyTrainer(config)

              # Test data collection
              examples, stats = trainer.collect_daily_data()
              print(f'Collected {len(examples)} examples')

              # Test status
              status = trainer.get_status()
              print(f'Status: {status}')

              print('✅ Nightly training simulation passed')

          asyncio.run(test_cycle())
          "
