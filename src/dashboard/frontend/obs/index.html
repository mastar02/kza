<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KZA — Dashboard wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0b0d;
    --bg-elev: #131316;
    --bg-elev-2: #18181c;
    --line: #26262c;
    --line-soft: #1d1d22;
    --ink: #e7e7ea;
    --ink-dim: #a1a1aa;
    --ink-mute: #6b6b73;
    --accent: #7c3aed;
    --accent-soft: rgba(124, 58, 237, 0.16);
    --accent-line: rgba(124, 58, 237, 0.4);
    --ok: #22c55e;
    --warn: #f59e0b;
    --err: #ef4444;
    --info: #38bdf8;
    --sans: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --hand: 'Caveat', cursive;
    --pad: 16px;
    --radius: 6px;
  }
  [data-density="cozy"]    { --pad: 20px; }
  [data-density="balanced"]{ --pad: 16px; }
  [data-density="dense"]   { --pad: 12px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  /* Wireframe sketchy treatment — subtle hand-drawn feel without losing legibility */
  .sketch-stroke { border: 1px dashed var(--line); }
  .hand { font-family: var(--hand); color: var(--ink-dim); }

  /* Layout shell */
  .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--bg-elev);
    border-right: 1px solid var(--line);
    padding: 18px 12px;
    position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 18px; border-bottom: 1px dashed var(--line-soft); margin-bottom: 12px; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--accent); color: white;
    display: grid; place-items: center;
    font-family: var(--mono); font-weight: 700; font-size: 13px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset;
  }
  .brand-name { font-weight: 600; letter-spacing: 0.2px; }
  .brand-sub  { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); }

  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-section { color: var(--ink-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; padding: 14px 8px 6px; font-family: var(--mono); }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 6px;
    color: var(--ink-dim);
    cursor: pointer;
    border: 1px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg-elev-2); color: var(--ink); }
  .nav-item.active { background: var(--accent-soft); color: var(--ink); border-color: var(--accent-line); }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-mute); }
  .nav-item.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .nav-item .ico { width: 16px; height: 16px; opacity: 0.85; }
  .nav-item .badge { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); }

  .sidebar-foot { margin-top: auto; padding: 10px 8px; border-top: 1px dashed var(--line-soft); display: flex; flex-direction: column; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); }
  .sidebar-foot .row { display: flex; justify-content: space-between; }

  .main { display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    height: 48px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    position: sticky; top: 0; z-index: 30;
  }
  .crumbs { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); }
  .crumbs b { color: var(--ink); font-weight: 500; }
  .topbar-spacer { flex: 1; }
  .pulse-group { display: flex; gap: 14px; align-items: center; font-family: var(--mono); font-size: 10px; color: var(--ink-dim); }
  .pulse { display: inline-flex; align-items: center; gap: 6px; }
  .pulse .led { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px currentColor; color: var(--ok); animation: blink 2.4s ease-in-out infinite; }
  .pulse.warn .led { background: var(--warn); color: var(--warn); }
  .pulse.err  .led { background: var(--err);  color: var(--err);  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .topbar input[type="search"] {
    background: var(--bg-elev); border: 1px solid var(--line);
    color: var(--ink); border-radius: 6px;
    padding: 6px 10px; font-family: var(--mono); font-size: 11px; width: 240px;
  }
  .topbar input[type="search"]::placeholder { color: var(--ink-mute); }

  .content { padding: 24px 28px 80px; max-width: 1500px; width: 100%; }
  [data-density="dense"] .content { padding: 16px 20px 60px; }
  [data-density="cozy"]  .content { padding: 32px 36px 100px; }

  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 18px; }
  .page-head h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .page-head .subtitle { color: var(--ink-dim); font-size: 12px; margin-top: 4px; }
  .page-head .meta { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); display: flex; gap: 12px; }

  /* Card primitives */
  .card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--radius); }
  .card-h { display: flex; align-items: center; justify-content: space-between; padding: 12px var(--pad); border-bottom: 1px solid var(--line-soft); }
  .card-h h3 { margin: 0; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
  .card-h .h-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); display: flex; gap: 10px; }
  .card-b { padding: var(--pad); }

  /* Common bits */
  .kbd { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border: 1px solid var(--line); border-radius: 4px; color: var(--ink-dim); background: var(--bg-elev-2); }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); font-family: var(--mono); font-size: 10px; color: var(--ink-dim); background: var(--bg-elev-2); white-space: nowrap; }
  .pill.ok   { color: var(--ok);   border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }
  .pill.warn { color: var(--warn); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
  .pill.err  { color: var(--err);  border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.08); }
  .pill.info { color: var(--info); border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.08); }
  .pill.accent { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }

  .mono { font-family: var(--mono); }
  .dim  { color: var(--ink-dim); }
  .mute { color: var(--ink-mute); }

  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .row { display: flex; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 12px; }

  /* Tables */
  table.k {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  table.k th, table.k td {
    padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--line-soft);
  }
  table.k th { font-weight: 500; color: var(--ink-mute); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; background: var(--bg-elev-2); }
  table.k td.mono, table.k td.num { font-family: var(--mono); font-size: 11px; }
  table.k td.num { text-align: right; }
  table.k tr:hover td { background: rgba(255,255,255,0.02); }
  table.k tr:last-child td { border-bottom: 0; }

  /* Sparkline */
  .spark { width: 100%; height: 28px; display: block; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border: 1px solid var(--line); border-radius: 5px; font-family: var(--mono); font-size: 11px; color: var(--ink-dim); background: var(--bg-elev-2); }
  .btn:hover { color: var(--ink); border-color: var(--ink-mute); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.danger { color: var(--err); border-color: rgba(239,68,68,0.3); }

  /* Skeleton/wire dashed */
  .wire { border: 1px dashed var(--line); border-radius: var(--radius); }
  .wire-fill { background:
    repeating-linear-gradient(135deg, transparent 0 6px, rgba(255,255,255,0.025) 6px 7px);
  }

  /* Hand-drawn annotation */
  .annot { position: relative; }
  .annot .note {
    font-family: var(--hand); font-size: 16px; color: var(--accent);
    position: absolute; pointer-events: none;
  }
  .annot .arrow { position: absolute; pointer-events: none; color: var(--accent); }

  /* App.jsx mounts one view at a time; no need to hide by default */
  .view { display: block; }

  /* Scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

  /* Waveform bars */
  .wf { display: flex; align-items: center; gap: 2px; height: 24px; }
  .wf span { display: block; width: 2px; background: var(--ink-dim); border-radius: 1px; }
  .wf.live span { background: var(--accent); animation: wfa 1.2s ease-in-out infinite; }
  @keyframes wfa {
    0%,100% { transform: scaleY(0.3); }
    50%     { transform: scaleY(1); }
  }

  /* Pipeline stage */
  .pipe { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-items: stretch; }
  .pipe .stage {
    border: 1px dashed var(--line);
    border-radius: 6px;
    padding: 10px;
    background: var(--bg-elev-2);
    position: relative;
  }
  .pipe .stage.active {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .pipe .stage h5 { margin: 0 0 4px; font-size: 11px; font-weight: 600; }
  .pipe .stage .mono { font-size: 10px; color: var(--ink-dim); }
  .pipe .arrow {
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    color: var(--ink-mute); font-family: var(--mono); font-size: 12px;
  }
  .pipe .stage:last-child .arrow { display: none; }

  /* Density tweaks */
  [data-density="dense"] .card-b { padding: 12px; }
  [data-density="dense"] .grid { gap: 10px; }
  [data-density="dense"] table.k th, [data-density="dense"] table.k td { padding: 6px 10px; }

  /* Annotation flag (wireframe vibe) */
  .stamp {
    display: inline-block;
    border: 1px dashed var(--accent-line);
    color: var(--accent);
    font-family: var(--hand);
    font-size: 14px;
    padding: 1px 8px;
    border-radius: 999px;
    transform: rotate(-2deg);
    background: var(--accent-soft);
  }

  /* PCA scatter */
  .scatter { width: 100%; height: 220px; display: block; }

  /* GPU meter */
  .meter { display: grid; grid-template-columns: 80px 1fr 60px; gap: 10px; align-items: center; padding: 6px 0; }
  .meter .label { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); }
  .meter .bar { height: 8px; background: var(--bg-elev-2); border: 1px solid var(--line-soft); border-radius: 999px; overflow: hidden; }
  .meter .bar > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
  .meter .val { font-family: var(--mono); font-size: 11px; text-align: right; color: var(--ink); }

  /* Logs */
  .logs { font-family: var(--mono); font-size: 11px; line-height: 1.55; max-height: 380px; overflow: auto; padding: 12px; background: #0a0a0c; border: 1px solid var(--line); border-radius: 6px; }
  .logs .ll { display: grid; grid-template-columns: 78px 60px 90px 1fr; gap: 10px; }
  .logs .ll .ts { color: var(--ink-mute); }
  .logs .ll .lvl { font-weight: 600; }
  .logs .ll .lvl.INFO { color: var(--info); }
  .logs .ll .lvl.WARN { color: var(--warn); }
  .logs .ll .lvl.ERR  { color: var(--err); }
  .logs .ll .lvl.OK   { color: var(--ok); }
  .logs .ll .svc { color: var(--accent); }
  .logs .ll .msg { color: var(--ink-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Section divider */
  .h-bar { display: flex; align-items: center; gap: 12px; margin: 24px 0 12px; }
  .h-bar h2 { font-size: 13px; font-weight: 600; margin: 0; letter-spacing: 0.02em; }
  .h-bar .line { flex: 1; height: 1px; background: var(--line); }
  .h-bar .meta { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); }
</style>
</head>
<body>

<div id="root"></div>

<script type="application/json" id="initial-tweaks">
/*EDITMODE-BEGIN*/{
  "accent": "violet",
  "density": "balanced",

}/*EDITMODE-END*/
</script>
