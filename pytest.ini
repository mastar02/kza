[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for async tests
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    gpu: Tests requiring GPU

# Coverage settings
addopts =
    --strict-markers
    --tb=short
    -v

# Logging
log_cli = false
log_cli_level = INFO
log_level = DEBUG
